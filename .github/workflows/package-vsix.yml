name: Package VSIX

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Build VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Package VSIX
        id: package
        run: |
          version="$(node -p "require('./package.json').version")"
          vsix_name="vscode-codex-groups-${version}.vsix"
          npx --yes @vscode/vsce package --out "$vsix_name"
          echo "vsix_name=$vsix_name" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-codex-groups-vsix
          path: ${{ steps.package.outputs.vsix_name }}
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${{ steps.package.outputs.vsix_name }}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${{ steps.package.outputs.vsix_name }}" --title "$GITHUB_REF_NAME" --notes "VSIX build for $GITHUB_REF_NAME"
          fi
